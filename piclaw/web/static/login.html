<!doctype html>
<html lang="en">
<!--
  login.html – TOTP/WebAuthn authentication page for PiClaw.

  Shown when WEB_TOTP_SECRET is configured. The page shell is static HTML,
  with minimal CSS/JS bundles loaded from /static/dist/.

  Served by: channels/web/auth.ts when the user is not authenticated.
-->
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Piclaw Login</title>
    <link rel="stylesheet" href="/static/dist/login.bundle.css?v=1" />
  </head>
  <body>
    <div class="card">
      <h1>Enter your code</h1>
      <p>Use the 6-digit code from your authenticator app.</p>
      <form id="login-form">
        <input
          id="code"
          name="code"
          type="text"
          inputmode="numeric"
          autocomplete="one-time-code"
          pattern="[0-9]*"
          maxlength="6"
          placeholder="••••••"
          autofocus
        />
        <button type="submit">Verify</button>
        <div class="error" id="error"></div>
      </form>
    </div>
    <script type="module" src="/static/dist/login.bundle.js?v=1"></script>
  </body>
</html>
