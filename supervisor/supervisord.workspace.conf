; supervisor/supervisord.workspace.conf – Workspace-local supervisord override.
;
; Synced to /workspace/.piclaw/supervisor/ on first boot. Identical to
; supervisord.conf but with conf.d path pointing to the workspace copy
; so users can add custom services without modifying the image.

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700
chown=agent:agent

[supervisord]
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=5MB
logfile_backups=5
loglevel=info
pidfile=/var/run/supervisord.pid
nodaemon=true
minfds=1024
minprocs=200
childlogdir=/var/log/supervisor
user=root

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[include]
files = /workspace/.piclaw/supervisor/conf.d/*.conf
