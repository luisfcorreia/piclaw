; supervisor/supervisord.conf – Default supervisord config for the Pibox container.
;
; Runs as root, manages piclaw and optional services. Program configs
; live in conf.d/. This file is copied to /etc/supervisor/ at image build.

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700
chown=agent:agent

[supervisord]
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=5MB
logfile_backups=5
loglevel=info
pidfile=/var/run/supervisord.pid
nodaemon=true
minfds=1024
minprocs=200
childlogdir=/var/log/supervisor
user=root

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[include]
files = /etc/supervisor/conf.d/*.conf
