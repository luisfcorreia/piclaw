<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Session Tree</title>
<style>
:root {
  --bg: #0f1117;
  --bg-hover: #1a1d28;
  --bg-active: rgba(29,155,240,0.12);
  --text: #d4d4d8;
  --text-dim: #8b8b9a;
  --accent: #1d9bf0;
  --border: #2a2d38;
  --branch: #444;
  --label-bg: rgba(29,155,240,0.15);
  --label-text: #1d9bf0;
  --radius: 6px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font); font-size: 13px;
  color: var(--text); background: var(--bg);
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}
.header {
  flex-shrink: 0; padding: 10px 16px;
  background: var(--bg); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.header h1 { font-size: 15px; font-weight: 600; flex: 1; }
.header button {
  padding: 5px 12px; border-radius: var(--radius);
  border: 1px solid var(--border); background: transparent;
  color: var(--text); cursor: pointer; font: inherit; font-size: 12px;
}
.header button:hover { background: var(--bg-hover); }
.tree-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
.tree { padding: 4px 0 80px; }
.node-row {
  display: flex; align-items: center; gap: 0;
  padding: 2px 12px 2px 0; min-height: 28px;
  cursor: pointer; transition: background 0.1s;
}
.node-row:hover { background: var(--bg-hover); }
.node-row.active { background: var(--bg-active); }
.node-row.selected { outline: 2px solid var(--accent); outline-offset: -2px; border-radius: var(--radius); }
.node-indent { flex-shrink: 0; }
.node-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--branch); flex-shrink: 0; margin: 0 7px 0 3px;
}
.node-dot.active { background: var(--accent); box-shadow: 0 0 0 3px rgba(29,155,240,0.25); }
.node-dot.branch-point { background: var(--accent); opacity: 0.5; }
.node-body { min-width: 0; flex: 1; display: flex; align-items: baseline; gap: 6px; }
.node-preview {
  font-size: 12px; line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0;
}
.node-id {
  font-family: var(--mono); font-size: 9px;
  color: var(--text-dim); flex-shrink: 0;
}
.node-label {
  display: inline-block; padding: 1px 5px;
  border-radius: 999px; font-size: 9px; font-weight: 600;
  background: var(--label-bg); color: var(--label-text); flex-shrink: 0;
}
.node-active-marker {
  font-size: 9px; color: var(--accent); font-weight: 600; flex-shrink: 0;
}
.detail-panel {
  flex-shrink: 0; padding: 10px 16px;
  background: var(--bg); border-top: 1px solid var(--border);
  display: none;
}
.detail-panel.visible { display: block; }
.detail-id { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
.detail-preview { font-size: 13px; line-height: 1.4; margin-bottom: 8px; word-break: break-word; }
.detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.detail-actions button {
  padding: 6px 14px; border-radius: var(--radius);
  border: 1px solid var(--border); background: transparent;
  color: var(--text); cursor: pointer; font: inherit; font-size: 12px;
}
.detail-actions button.primary { border-color: var(--accent); color: var(--accent); }
.detail-actions button:hover { background: var(--bg-hover); }
.info-bar { padding: 6px 16px; font-size: 11px; color: var(--text-dim); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.empty { padding: 32px; text-align: center; color: var(--text-dim); }
</style>
</head>
<body>
<div class="header">
  <h1>Session Tree</h1>
  <button onclick="window.piclawWidget?.close({reason:'done'})">Close</button>
</div>
<div id="info-bar" class="info-bar" style="display:none"></div>
<div class="tree-scroll" id="tree-scroll">
  <div id="tree-root" class="tree"></div>
</div>
<div id="detail-panel" class="detail-panel">
  <div class="detail-id" id="detail-id"></div>
  <div class="detail-preview" id="detail-preview"></div>
  <div class="detail-actions">
    <button class="primary" onclick="navigateToSelected()">Navigate here</button>
    <button onclick="navigateToSelected(true)">Navigate + Summarize</button>
  </div>
</div>
<script>
// Try to inherit parent CSS variables; silently ignore failures
(function() {
  try {
    var p = window.parent;
    if (!p || !p.document || !p.getComputedStyle) return;
    var cs = p.getComputedStyle(p.document.documentElement);
    function get(name) { return (cs.getPropertyValue(name) || '').trim(); }
    var bg = get('--bg-primary');
    var text = get('--text-primary');
    // Only apply if we got real values (not empty)
    if (bg && text) {
      var s = document.documentElement.style;
      s.setProperty('--bg', bg);
      s.setProperty('--text', text);
      var v;
      if ((v = get('--text-secondary'))) s.setProperty('--text-dim', v);
      if ((v = get('--bg-hover'))) s.setProperty('--bg-hover', v);
      if ((v = get('--accent-color'))) s.setProperty('--accent', v);
      if ((v = get('--border-color'))) s.setProperty('--border', v);
    }
  } catch(e) { /* expected in cross-origin or sandboxed contexts */ }
})();

var treeData = null;
var selectedId = null;

// Build nested tree from flat parentId-linked array (iterative)
function buildTreeFromFlat(flatNodes) {
  var byId = {}, roots = [], i, n, node;
  for (i = 0; i < flatNodes.length; i++) {
    n = flatNodes[i];
    byId[n.id] = { id: n.id, parentId: n.parentId, type: n.type, timestamp: n.timestamp,
                    label: n.label, active: n.active, preview: n.preview, children: [], depth: 0 };
  }
  for (i = 0; i < flatNodes.length; i++) {
    n = flatNodes[i];
    node = byId[n.id];
    if (n.parentId && byId[n.parentId]) {
      byId[n.parentId].children.push(node);
    } else {
      roots.push(node);
    }
  }
  // Compute depths iteratively
  var stack = [];
  for (i = roots.length - 1; i >= 0; i--) { roots[i].depth = 0; stack.push(roots[i]); }
  while (stack.length > 0) {
    node = stack.pop();
    for (i = node.children.length - 1; i >= 0; i--) {
      node.children[i].depth = node.depth + 1;
      stack.push(node.children[i]);
    }
  }
  return roots;
}

// Flatten nested tree into render order (iterative DFS)
function flattenTree(roots) {
  var result = [], stack = [], i;
  for (i = roots.length - 1; i >= 0; i--) stack.push(roots[i]);
  while (stack.length > 0) {
    var node = stack.pop();
    result.push(node);
    for (i = (node.children || []).length - 1; i >= 0; i--) stack.push(node.children[i]);
  }
  return result;
}

function renderTree() {
  var root = document.getElementById('tree-root');
  var infoBar = document.getElementById('info-bar');
  root.innerHTML = '';

  if (!treeData || !treeData.nodes || treeData.nodes.length === 0) {
    root.innerHTML = '<div class="empty">Session tree is empty.</div>';
    return;
  }

  if (treeData.capped) {
    infoBar.textContent = 'Showing last ' + treeData.nodes.length + ' of ' + treeData.total + ' entries.';
    infoBar.style.display = '';
  }

  var trees = treeData.flat ? buildTreeFromFlat(treeData.nodes) : treeData.nodes;
  var flat = flattenTree(trees);
  var activeRowEl = null;

  for (var idx = 0; idx < flat.length; idx++) {
    var node = flat[idx];
    var row = document.createElement('div');
    row.className = 'node-row' + (node.active ? ' active' : '');
    row.setAttribute('data-id', node.id);
    row.onclick = (function(n) { return function(e) { selectNode(n, e.currentTarget); }; })(node);

    // Indent
    var indent = document.createElement('div');
    indent.className = 'node-indent';
    indent.style.width = ((node.depth || 0) * 16 + 8) + 'px';
    row.appendChild(indent);

    // Dot
    var dot = document.createElement('div');
    var hasBranch = (node.children || []).length > 1;
    dot.className = 'node-dot' + (node.active ? ' active' : hasBranch ? ' branch-point' : '');
    row.appendChild(dot);

    // Body
    var body = document.createElement('div');
    body.className = 'node-body';

    var preview = document.createElement('span');
    preview.className = 'node-preview';
    preview.textContent = node.preview || '[' + (node.type || 'entry') + ']';
    body.appendChild(preview);

    if (node.label) {
      var lbl = document.createElement('span');
      lbl.className = 'node-label';
      lbl.textContent = node.label;
      body.appendChild(lbl);
    }

    if (node.active) {
      var marker = document.createElement('span');
      marker.className = 'node-active-marker';
      marker.textContent = '\u2190 active';
      body.appendChild(marker);
    }

    var idSpan = document.createElement('span');
    idSpan.className = 'node-id';
    idSpan.textContent = node.id.slice(0, 8);
    body.appendChild(idSpan);

    row.appendChild(body);
    root.appendChild(row);

    if (node.active) activeRowEl = row;
  }

  // Scroll active node into view
  if (activeRowEl) {
    setTimeout(function() { activeRowEl.scrollIntoView({ block: 'center', behavior: 'auto' }); }, 50);
  }
}

function selectNode(node, rowEl) {
  selectedId = node.id;
  var prev = document.querySelector('.node-row.selected');
  if (prev) prev.classList.remove('selected');
  if (rowEl) rowEl.classList.add('selected');

  document.getElementById('detail-id').textContent = node.id + (node.active ? '  (active leaf)' : '');
  document.getElementById('detail-preview').textContent = node.preview || '[' + (node.type || 'entry') + ']';
  document.getElementById('detail-panel').classList.add('visible');
}

function navigateToSelected(summarize) {
  if (!selectedId) return;
  var cmd = '/tree ' + selectedId;
  if (summarize) cmd += ' --summarize';
  if (window.piclawWidget) {
    window.piclawWidget.submit({ text: cmd });
    window.piclawWidget.close({ reason: 'navigated' });
  }
}

renderTree();
</script>
</body>
</html>
